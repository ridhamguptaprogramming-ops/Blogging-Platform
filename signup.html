<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Blogging Platform account to start writing, managing drafts, and publishing posts.">
  <meta name="theme-color" content="#ffc466">
  <title>Sign Up | Blogging Platform</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="court-enhancements.css">
</head>
<body>

<div class="auth-box">
  <h2>Create Account</h2>

  <input type="text" id="signupName" placeholder="Full Name">
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPassword" placeholder="Password">

  <button onclick="signup()">Sign Up</button>

  <p>Already have an account?
    <a href="login.html">Login</a>
  </p>
</div>


<script src="auth.js"></script>
<script src="court-enhancements.js"></script>
</body>
</html>
